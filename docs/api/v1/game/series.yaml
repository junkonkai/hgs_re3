openapi: 3.0.3
info:
  title: Game Master API - Series
  description: シリーズのCRUDおよび紐づけ（titles）
  version: 1.0.0

servers:
  - url: /api/v1/admin/game
security:
  - bearerAuth: []

paths:
  /series:
    get:
      summary: シリーズ一覧（検索・ページネーション）
      description: name で部分一致検索。クエリ q で検索。
      operationId: listSeries
      parameters:
        - $ref: common.yaml#/components/parameters/page
        - $ref: common.yaml#/components/parameters/per_page
        - $ref: common.yaml#/components/parameters/q
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Series'
                  meta:
                    $ref: common.yaml#/components/schemas/PaginationMeta
                  links:
                    $ref: common.yaml#/components/schemas/PaginationLinks
    post:
      summary: シリーズ追加
      operationId: createSeries
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SeriesRequest'
      responses:
        '201':
          description: 作成成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/Series'
        '422':
          description: バリデーションエラー
          content:
            application/json:
              schema:
                $ref: common.yaml#/components/schemas/ErrorResponse

  /series/{id}:
    get:
      summary: シリーズ詳細
      operationId: showSeries
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/Series'
        '404':
          description: Not Found
    put:
      summary: シリーズ更新
      operationId: updateSeries
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SeriesRequest'
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/Series'
        '404':
          description: Not Found
        '422':
          description: バリデーションエラー
          content:
            application/json:
              schema:
                $ref: common.yaml#/components/schemas/ErrorResponse
    delete:
      summary: シリーズ削除
      operationId: deleteSeries
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        '204':
          description: 削除成功
        '404':
          description: Not Found

  /series/{id}/titles:
    get:
      summary: 紐づくタイトル一覧
      operationId: listSeriesTitles
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        id: { type: integer }
                        name: { type: string }
        '404':
          description: Not Found
    post:
      summary: タイトルを紐づけに追加
      operationId: attachSeriesTitles
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required: [game_title_ids]
              properties:
                game_title_ids:
                  type: array
                  items: { type: integer }
      responses:
        '200':
          description: 成功
        '404':
          description: Not Found
        '422':
          description: バリデーションエラー
    put:
      summary: タイトル紐づけを上書き（sync）
      operationId: syncSeriesTitles
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                game_title_ids:
                  type: array
                  items: { type: integer }
                  default: []
      responses:
        '200':
          description: 成功
        '404':
          description: Not Found
        '422':
          description: バリデーションエラー
  /series/{id}/titles/{titleId}:
    delete:
      summary: タイトル紐づけを1件削除
      operationId: detachSeriesTitle
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
        - name: titleId
          in: path
          required: true
          schema: { type: integer }
      responses:
        '204':
          description: 削除成功
        '404':
          description: Not Found

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: Bearer
  schemas:
    Series:
      type: object
      properties:
        id: { type: integer }
        game_franchise_id: { type: integer }
        name: { type: string }
        phonetic: { type: string }
        node_name: { type: string }
        description: { type: string, nullable: true }
        description_source: { type: string, nullable: true }
    SeriesRequest:
      type: object
      required:
        - game_franchise_id
        - name
        - phonetic
        - node_name
      properties:
        game_franchise_id: { type: integer }
        name: { type: string, maxLength: 200 }
        phonetic: { type: string, maxLength: 200 }
        node_name: { type: string, maxLength: 200 }
        description: { type: string, nullable: true }
        description_source: { type: string, nullable: true }
